<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Curriculum Vitae</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 5px;
      padding: 2px;
      height: 99%;
      background: #ffffff;
    }

    /* Outer framed container */
    #frame {
      max-width: 900px;
      margin: 24px auto;
      padding: 16px;
      border: 4px solid #d6d6d6;
      box-sizing: border-box;
      background: #ffffff;
    }

    /* Canvas wrapper */
    #pdf {
      width: 100%;
    }

    /* Individual PDF pages */
canvas {
  display: block;
  width: 100%;
  height: auto;
  margin: 0 auto 20px auto;
  background: #ffffff;
}

    /* Tighter spacing on small screens */
    @media (max-width: 600px) {
      #frame {
        margin: 12px;
        padding: 8px;
      }

      canvas {
        margin-bottom: 16px;
      }
    }
  </style>
</head>

<body>
  <div id="frame">
    <div id="pdf"></div>
  </div>

  <script type="module">
    import * as pdfjsLib from './pdf.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

    const url = './CV_MJGavan.pdf';
    const container = document.getElementById('pdf');
    const frame = document.getElementById('frame');

    const pdf = await pdfjsLib.getDocument(url).promise;

   for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
  const page = await pdf.getPage(pageNum);

  const containerWidth = frame.clientWidth;

  // Base viewport (CSS pixels)
  const baseViewport = page.getViewport({ scale: 1 });
  const scale = containerWidth / baseViewport.width;
  const viewport = page.getViewport({ scale });

  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');
  container.appendChild(canvas);

  // High-DPI rendering
  const dpr = Math.min(window.devicePixelRatio || 1, 3); // cap at 3 for performance

  // CSS size (what the user sees)
  canvas.style.width = `${viewport.width}px`;
  canvas.style.height = `${viewport.height}px`;

  // Internal resolution (what determines sharpness)
  canvas.width = Math.floor(viewport.width * dpr);
  canvas.height = Math.floor(viewport.height * dpr);

  context.setTransform(dpr, 0, 0, dpr, 0, 0);

  await page.render({
    canvasContext: context,
    viewport
  }).promise;
}

    /* Re-render on resize (e.g. mobile rotation) */
    window.addEventListener('resize', () => location.reload());
  </script>
</body>
</html>
