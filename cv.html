<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Curriculum Vitae</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #f2f2f2; /* light grey page background */
  }

  /* Outer framed container (the CV area) */
  #frame {
    max-width: 1000px;
    margin: 40px auto;
    padding: 30px;
    border: 1px solid #d6d6d6;
    background: #ffffff; /* white paper */
    box-sizing: border-box;
  }

  /* Canvas wrapper */
  #pdf {
    width: 100%;
  }

  /* Individual PDF pages */
 canvas {
  display: block;
  margin: 0 auto 20px auto;
  background: #ffffff;
}

  /* Tighter spacing on small screens */
  @media (max-width: 600px) {
    #frame {
      margin: 16px;
      padding: 8px;
    }

    canvas {
      margin-bottom: 16px;
    }
  }
</style>
</head>

<body>
  <div id="frame">
    <div id="pdf"></div>
  </div>

  <script type="module">
    import * as pdfjsLib from './pdf.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

    const url = './CV_MJGavan.pdf';
    const container = document.getElementById('pdf');
    const frame = document.getElementById('frame');

    const pdf = await pdfjsLib.getDocument(url).promise;

for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
  const page = await pdf.getPage(pageNum);

  // Use the actual viewport width as the hard constraint (prevents odd mobile/layout cases)
  const availableWidth = Math.min(
    frame.clientWidth,
    document.documentElement.clientWidth - 32 // small safety margin
  );

  // Fit the PDF page to that width (in CSS pixels)
  const baseViewport = page.getViewport({ scale: 1 });
  const scaleToFit = availableWidth / baseViewport.width;
  const viewport = page.getViewport({ scale: scaleToFit });

  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d', { alpha: false });
  container.appendChild(canvas);

  // High-DPI backing store for crisp text
  const dpr = Math.min(window.devicePixelRatio || 1, 3);

  // CSS display size (exact, avoids CSS rescaling artefacts)
  canvas.style.width = `${viewport.width}px`;
  canvas.style.height = `${viewport.height}px`;

  // Actual pixel buffer
  canvas.width = Math.floor(viewport.width * dpr);
  canvas.height = Math.floor(viewport.height * dpr);

  context.setTransform(dpr, 0, 0, dpr, 0, 0);

  await page.render({
    canvasContext: context,
    viewport
  }).promise;
}

    /* Re-render on resize (e.g. mobile rotation) */
    window.addEventListener('resize', () => location.reload());
  </script>
</body>
</html>
